<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Niels Joachim Gormsen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bold: #222;
    --body: #444;
    --accent: #8b1a1a;
    --bg: #fefefd;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--body);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 15.5px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  main {
    max-width: 640px;
    margin: 0 auto;
    padding: 18vh 28px 10vh;
  }
  h1 {
    color: var(--bold);
    font-weight: 600;
    font-size: 1.7rem;
    margin: 0 0 0.5rem;
    letter-spacing: -0.01em;
  }
  .titles { margin: 0 0 1.75rem; }
  .titles span { display: block; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .note { color: var(--body); margin: 0 0 1.75rem; }
  .links span::after {
    content: '·';
    margin: 0 0.55rem;
    color: #bbb;
  }
  .links span:last-child::after { content: ''; margin: 0; }
</style>
</head>
<body>
<main>
  <h1>Niels Joachim Gormsen</h1>
  <p class="titles">
    <span>DNRF Chair Professor, Copenhagen Business School</span>
    <span>On leave from the University of Chicago Booth School of Business</span>
  </p>
  <p class="note">A new site is on the way. In the meantime:</p>
  <p class="links">
    <span><a href="https://voices.uchicago.edu/gormsen">Current page</a></span>
    <span><a href="https://costofcapital.org">Cost of Capital Project</a></span>
    <span><a href="mailto:njg.fi@cbs.dk">Email</a></span>
  </p>
</main>
</body>
</html>
